<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIA Admin - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-BTv7sNbabCxRr3G6kEQ2f3KWbNjC+M+U3E6N4i32Y9V6JpX1h2BsmX9WgAFEO0zB" crossorigin="anonymous" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-light">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h2 class="card-title mb-3">Painel Administrativo</h2>
            <p class="text-muted">Faça login com usuário e senha para acessar os relatórios.</p>
            <form id="login-form">
              <div class="mb-3">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" id="username" class="form-control" required />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" class="form-control" required />
              </div>
              <button class="btn btn-primary w-100" type="submit">Entrar</button>
            </form>
            <div id="login-message" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
