<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIA Admin - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="login-page">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="card login-card">
          <div class="card-body">
            <div class="brand-mark"><i class="bi bi-shield-lock fs-3"></i></div>
            <h1 class="h3 mb-2">Painel Administrativo</h1>
            <p class="text-muted mb-4">Acesse o ambiente de gestão e análise das respostas do SIA.</p>
            <form id="login-form">
              <div class="mb-3">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" id="username" class="form-control" autocomplete="username" required />
              </div>
              <div class="mb-4">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" class="form-control" autocomplete="current-password" required />
              </div>
              <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right"></i>Entrar</button>
            </form>
            <div id="login-message" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
