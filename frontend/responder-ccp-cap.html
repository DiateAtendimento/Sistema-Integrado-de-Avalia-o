<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIA - Avaliação do CCP/CAP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-BTv7sNbabCxRr3G6kEQ2f3KWbNjC+M+U3E6N4i32Y9V6JpX1h2BsmX9WgAFEO0zB" crossorigin="anonymous" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-formulario="ccp-cap" class="bg-light">
  <header class="py-4 bg-primary text-white text-center">
    <div class="container">
      <h1 class="h3 mb-2">Avaliação do CCP/CAP</h1>
      <p class="mb-0">Responda em etapas para registrar sua avaliação.</p>
    </div>
  </header>

  <main class="container py-5">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <div class="progress mb-4" style="height: 18px;">
          <div id="form-progress" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
        </div>

        <form id="evaluation-form" novalidate>
          <div id="form-steps"></div>
          <div class="d-flex justify-content-between mt-4">
            <button type="button" id="prev-step" class="btn btn-outline-secondary">Voltar</button>
            <button type="button" id="next-step" class="btn btn-primary">Próximo</button>
            <button type="submit" id="submit-form" class="btn btn-success d-none">Enviar</button>
          </div>
        </form>
        <div id="form-message" class="mt-4"></div>
      </div>
    </div>
  </main>

  <footer class="py-4 bg-white text-center border-top">
    <div class="container text-muted">© 2026 SIA - Sistema Integrado de Avaliação</div>
  </footer>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
