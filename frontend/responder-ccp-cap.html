<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIA - Avaliação do CCP/CAP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-formulario="ccp-cap" class="bg-light">
  <header class="site-header py-4 text-center">
    <div class="container">
      <a href="index.html" class="header-back-link" aria-label="Voltar para a página principal">
        <i class="bi bi-house-door-fill"></i>
        <span>Início</span>
      </a>
      <div class="page-kicker">Formulário público</div>
      <h1 class="h2 mb-2">Avaliação do CCP/CAP</h1>
      <p class="mb-0">Responda em etapas para registrar sua avaliação.</p>
    </div>
  </header>

  <main class="container page-shell">
    <div class="card evaluation-card">
      <div class="card-body">
        <div class="progress mb-4">
          <div id="form-progress" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
        </div>

        <form id="evaluation-form" novalidate>
          <div id="form-steps"></div>
          <div class="form-actions d-flex justify-content-between align-items-center gap-3 mt-4">
            <button type="button" id="prev-step" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i>Voltar</button>
            <button type="button" id="next-step" class="btn btn-primary">Próximo<i class="bi bi-arrow-right"></i></button>
            <button type="submit" id="submit-form" class="btn btn-success d-none"><i class="bi bi-send-check"></i>Enviar avaliação</button>
          </div>
        </form>
        <div id="form-message" class="mt-4"></div>
      </div>
    </div>
  </main>

  <footer class="footer py-4 text-center">
    <div class="container text-muted">© 2026 SIA - Sistema Integrado de Avaliação</div>
  </footer>

  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
